name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS arm64 — full server build
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vt-yubi-darwin-arm64
            cargo_flags: ""
            apt_packages: ""
          # Linux x86_64 glibc — full server build (YubiKey support)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vt-yubi-linux-amd64-server
            cargo_flags: ""
            apt_packages: "libpcsclite-dev pkg-config"
          # Linux x86_64 musl — client-only static binary (no YubiKey deps)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vt-yubi-linux-amd64-client
            cargo_flags: "--no-default-features"
            apt_packages: "musl-tools"

    env:
      VERSION: ${{ github.ref_name }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install apt packages (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.cargo_flags }}

      - name: Package binary
        run: |
          chmod +x target/${{ matrix.target }}/release/vt-yubi
          tar czf ${{ matrix.artifact }}-${{ env.VERSION }}.tar.gz -C target/${{ matrix.target }}/release vt-yubi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ env.VERSION }}
          path: ${{ matrix.artifact }}-${{ env.VERSION }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            for file in "$dir"*; do
              sha256sum "$file" >> ../checksums.txt
            done
          done
          # Clean up paths in checksums
          sed -i 's|[^ ]*/||' ../checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            checksums.txt
